[build]
  publish = "."
  command = "cd netlify/functions && npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# Redirige /api/chat vers la Netlify Function (pas besoin de changer le JS)
[[redirects]]
  from = "/api/chat"
  to   = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/404"
  to   = "/404.html"
  status = 404
